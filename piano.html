<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>World Piano Map</title>

<meta name="description" content="Minimalist monochrome world map where countries act as piano keys with interactive musical playback."/>
<meta name="keywords" content="interactive map, svg, equal-area projection, audio interface, monochrome, chorographic"/>
<meta name="orig_prompt" content="Monochrome interactive world map that turns countries into piano keys, with playable song guides and minimalist cartographic interface."/>

<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>    
<script src="https://d3js.org/d3.v7.min.js"></script>
    

<style>
body {
  margin: 0;
  background: #000;
  font-family: sans-serif;
  color: #fff;
  overflow: hidden;
}

#map {
  width: 100vw;
  height: 100vh;
}

.country {
  fill: rgba(0,0,0,0.001); /* almost invisible but still 'painted' */
  pointer-events: all;
  stroke: #fff;
  stroke-width: 0.5;
  cursor: pointer;
  transition: fill 0.2s;
}

.country:hover {
  fill: #222;
}

.active {
  fill: #fff;
}

#title {
  position: absolute;
  top: 15px;
  left: 20px;
  font-size: 18px;
}

#controls {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

button {
  background: #111;
  color: #fff;
  border: 1px solid #555;
  padding: 8px 12px;
  margin-right: 10px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  background: rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
}

#modalContent {
  background:#111;
  padding:20px;
  max-width:400px;
}
</style>
</head>

<body>

<div id="title">🌍 World Piano Map</div>

<div id="controls">
  <button id="urlSongBtn" style="display:none;" onclick="handleUrlSongClick()">▶ Play URL Tune</button>
  <button onclick="playSong()">Play Guide</button>
  <button onclick="openModal()">Info</button>
</div>

<div id="modal" onclick="closeModal()">
  <div id="modalContent">
    <h3>About</h3>
    <p>Countries act as piano keys. Click to play. Follow guided sequences.</p>
    <p>Made with Web Mapper GPT</p>
  </div>
</div>

<svg id="map"></svg>

<script>

// --- Audio State Management ---
let audioCtx;
let piano;
let audioReady = false;
let isPlaying = false; 

const noteMap = {
  C: "C4",
  D: "D4",
  E: "E4",
  F: "F4",
  G: "G4",
  A: "A4",
  B: "B4"
};

async function initPiano() {
  if (audioReady) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }
  piano = await Soundfont.instrument(audioCtx, "acoustic_grand_piano", {
    soundfont: "MusyngKite",
    format: "mp3"
  });
  audioReady = true;
}

// Global unlock: If user clicks the MAP (not a button), initialize audio
async function unlockAudio(e) {
  if (e.target.tagName === 'BUTTON') return; // Let button handlers take over
  await initPiano();
  window.removeEventListener("pointerdown", unlockAudio);
}
window.addEventListener("pointerdown", unlockAudio);

// --- URL Hash Logic ---
function parseHashSong() {
  const hash = decodeURIComponent(window.location.hash.slice(1)).toUpperCase();
  if (!hash) return null;
  const cleaned = hash.replace(/[—\-,]/g, ' ');
  const notes = cleaned.split(/\s+/).filter(n => noteMap[n]);
  return notes.length > 0 ? notes : null;
}

function checkHashVisibility() {
  const notes = parseHashSong();
  const btn = document.getElementById("urlSongBtn");
  btn.style.display = (notes && notes.length > 0) ? "inline-block" : "none";
}

async function handleUrlSongClick() {
  // Check if map data is actually loaded yet
  if (d3.selectAll(".country").empty()) {
    console.log("Map not ready yet, please wait a second.");
    return;
  }
  
  window.removeEventListener("pointerdown", unlockAudio);
  await initPiano();
  playHashSong();
}

async function playHashSong() {
  if (isPlaying) return; 
  const notes = parseHashSong();
  if (!notes || !piano) return;

  isPlaying = true;
  let i = 0;
  
  const interval = setInterval(() => {
    if (i >= notes.length) {
      clearInterval(interval);
      isPlaying = false;
      return;
    }
    
    const currentNoteName = noteMap[notes[i]];
    
    if (currentNoteName) {
      // 1. Play the Sound
      piano.play(currentNoteName, 0, { duration: 1.2, gain: 1.5 });
      
      // 2. Find ALL countries that match this note
      const matchingCountries = d3.selectAll(".country").filter(function(d) {
        return getNoteFromCountry(d) === currentNoteName;
      });

      // 3. Flash a random one from the matching set
      if (!matchingCountries.empty()) {
        const nodes = matchingCountries.nodes();
        const randomNode = nodes[Math.floor(Math.random() * nodes.length)];
        flashCountry(d3.select(randomNode));
      }
    }
    i++;
  }, 500);
}
    
// --- Map Setup ---
const width = window.innerWidth;
const height = window.innerHeight;
const svg = d3.select("#map").attr("width", width).attr("height", height);

const projection = d3.geoEqualEarth().fitSize([width, height], {type: "Sphere"});
const path = d3.geoPath(projection);

function getNoteFromCountry(d) {
  const centroid = d3.geoCentroid(d);
  const lon = centroid[0];
  const notes = ["C","D","E","F","G","A","B"];
  const index = Math.floor(((lon + 180) / 360) * notes.length);
  return noteMap[notes[index]];
}

function flashCountry(el) {
  el.interrupt();
  el.transition().duration(50).attr("fill", "#fff")
    .transition().duration(250).attr("fill", "rgba(0,0,0,0.001)");
}

// Load Map Data
d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
.then(data => {
  svg.selectAll("path")
    .data(data.features)
    .enter()
    .append("path")
    .attr("class", "country")
    .attr("d", path)
    .on("click", async function(event, d) {
      const note = getNoteFromCountry(d);
      await initPiano();
      if (piano && note) {
        piano.play(note, 0, { duration: 1.2, gain: 1.3 });
      }
      flashCountry(d3.select(this));
    });
});

// --- Manual Guide Song ---
const song = [-10, 20, 40, 60, 30, 0];
async function playSong() {
  if (isPlaying) return;
  await initPiano();
  isPlaying = true;
  let i = 0;
  const interval = setInterval(() => {
    if (i >= song.length) {
      clearInterval(interval);
      isPlaying = false;
      return;
    }
    const notes = ["C","D","E","F","G","A","B"];
    const index = Math.floor(((song[i] + 180) / 360) * notes.length);
    const note = noteMap[notes[index]];
    if (piano && note) {
      piano.play(note, 0, { duration: 1.2 });
      
      // Visual feedback for the Guide button too!
      const matching = d3.selectAll(".country").filter(d => getNoteFromCountry(d) === note);
      if(!matching.empty()){
        const nodes = matching.nodes();
        flashCountry(d3.select(nodes[Math.floor(Math.random() * nodes.length)]));
      }
    }
    i++;
  }, 500);
}

// --- UI Helpers ---
function openModal() { document.getElementById("modal").style.display = "flex"; }
function closeModal() { document.getElementById("modal").style.display = "none"; }

// Listeners
window.addEventListener("load", checkHashVisibility);
window.addEventListener("hashchange", checkHashVisibility);   
</script>

</body>
</html>
