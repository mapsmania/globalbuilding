<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>What1Tune - Musical Earth</title>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>

<style>
:root {
    --header-height: 50px;
    --bg-black: #000;
    --text-white: #fff;
    --accent-red: #ff3333;
    --ui-white: #ffffff;
    --shadow: 0 4px 12px rgba(0,0,0,0.15);
}

body { margin: 0; background: var(--bg-black); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

/* HEADER */
#main-header {
    position: fixed;
    top: 0; left: 0; width: 100%;
    height: var(--header-height);
    background: var(--bg-black);
    color: var(--text-white);
    display: flex;
    align-items: center;
    padding: 0 15px;
    z-index: 20;
}

#logo-circle {
    width: 32px; height: 32px;
    background: var(--accent-red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-right: 10px;
}

/* MAP */
#map { position: absolute; top: var(--header-height); bottom: 0; width: 100%; }

/* UI CONTAINERS (LEFT) */
#overlay-wrapper {
    position: absolute;
    top: calc(var(--header-height) + 15px);
    left: 15px;
    width: 360px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

#status {
    color: white; font-size: 12px; font-weight: bold; padding-left: 5px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}

.ui-card {
    background: var(--ui-white);
    padding: 12px 15px;
    border-radius: 25px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 10px;
}

.card-icon { color: var(--accent-red); font-size: 20px; font-weight: bold; min-width: 20px; }

#tune-output {
    font-family: 'Courier New', monospace; font-weight: bold; color: #333;
    flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.action-btn {
    background: #f0f0f0; border: none; color: #666; padding: 6px 12px;
    border-radius: 15px; font-size: 11px; cursor: pointer; transition: 0.2s;
}
.action-btn:hover { background: #e0e0e0; }

#tune-search { border: none; outline: none; flex-grow: 1; font-size: 14px; background: transparent; }
#search-btn { background: var(--accent-red); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

/* SHARE DRAWER (RIGHT) */
#share-drawer {
    position: fixed;
    top: calc(var(--header-height) + 15px);
    right: -400px; /* Hidden by default */
    width: 320px;
    background: var(--ui-white);
    padding: 25px;
    border-radius: 25px 0 0 25px;
    box-shadow: var(--shadow);
    z-index: 30;
    transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#share-drawer.active { right: 0; }

.share-header { font-weight: bold; color: #333; margin-bottom: 10px; line-height: 1.4; }
.share-notation {
    background: #f9f9f9; padding: 15px; border-radius: 15px;
    font-family: 'Courier New', monospace; color: var(--accent-red);
    font-weight: bold; text-align: center; border: 1px dashed #ccc;
    margin-top: 15px; cursor: pointer;
}

#close-share {
    position: absolute; top: 10px; right: 15px;
    background: none; border: none; font-size: 20px; cursor: pointer; color: #ccc;
}
</style>
</head>

<body>

<div id="main-header">
    <div id="logo-circle">♪</div>
    <div style="font-weight:bold; font-size: 18px;">What1Tune</div>
</div>

<div id="map"></div>

<div id="overlay-wrapper">
    <div id="status">Click map to generate music</div>

    <div class="ui-card" id="output-card" style="display:none;">
        <span class="card-icon">♪</span>
        <div id="tune-output"></div>
        <button id="copy-btn" class="action-btn">Copy</button>
        <button id="share-btn" class="action-btn">Share</button>
    </div>

    <div class="ui-card">
        <input id="tune-search" placeholder="Paste tune to travel..." />
        <button id="search-btn">Go</button>
    </div>
</div>

<div id="share-drawer">
    <button id="close-share">&times;</button>
    <div id="full-share-message">
        <div class="share-header">
            I’m sharing a What1Tune address to help you find this specific location. Paste this tune into 
            https://mapsmania.github.io/globalbuilding/what1tune.html (What1Tune) 
            to view this location on a map:
        </div>
        <div id="share-content" class="share-notation"></div>
    </div>
    
    <button id="copy-full-message" style="width:100%; margin-top:15px; background: var(--accent-red); color: white; border: none; padding: 12px; border-radius: 20px; font-weight: bold; cursor: pointer;">
        Copy Full Message
    </button>
</div>
    
<script>
const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [0, 0],
    zoom: 2
});

let audioCtx, piano, audioReady = false;

async function initAudio() {
    if (audioReady) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    piano = await Soundfont.instrument(audioCtx, "electric_piano_1", {
        soundfont: "MusyngKite",
        format: "mp3"
    });
    audioReady = true;
}

const motifMap = {"00": "C4", "01": "E4", "10": "G4", "11": "C5"};
    
function encodeGeo(lng, lat, precision = 20) {
    let latMin = -90, latMax = 90, lngMin = -180, lngMax = 180, bits = [];
    for (let i = 0; i < precision; i++) {
        let lngMid = (lngMin + lngMax) / 2;
        if (lng > lngMid) { bits.push(1); lngMin = lngMid; } else { bits.push(0); lngMax = lngMid; }
        let latMid = (latMin + latMax) / 2;
        if (lat > latMid) { bits.push(1); latMin = latMid; } else { bits.push(0); latMax = latMid; }
    }
    return bits;
}

function decodeGeo(bits) {
    let latMin = -90, latMax = 90, lngMin = -180, lngMax = 180;
    for (let i = 0; i < bits.length; i += 2) {
        let lngMid = (lngMin + lngMax) / 2;
        if (bits[i] === 1) lngMin = lngMid; else lngMax = lngMid;
        let latMid = (latMin + latMax) / 2;
        if (bits[i + 1] === 1) latMin = latMid; else latMax = latMid;
    }
    return { lat: latMin + (latMax - latMin) / 2, lng: lngMin + (lngMax - lngMin) / 2 };
}

function bitsToTune(bits) {
    let tune = [];
    for (let i = 0; i < bits.length; i += 2) {
        tune.push(motifMap["" + bits[i] + bits[i + 1]]);
    }
    return tune;
}

function tuneToBits(tune) {
    let rev = {"C4":"00", "E4":"01", "G4":"10", "C5":"11"}, bits = [];
    for (let n of tune) {
        let b = rev[n];
        if (b) bits.push(Number(b[0]), Number(b[1]));
    }
    return bits;
}

async function playTune(tune) {
    if (!audioReady) await initAudio();
    const card = document.getElementById("output-card");
    card.style.display = "flex";
    document.getElementById("tune-output").innerText = tune.join(" ");
    document.getElementById("share-content").innerText = tune.join(" ");
    document.getElementById("copy-btn").innerText = "Copy";

    tune.forEach((note, i) => {
        setTimeout(() => {
            piano.play(note, 0, { duration: 0.6, gain: 1.2 });
        }, i * 180);
    });
}

map.on("click", async (e) => {
    if (!audioReady) await initAudio();
    const bits = encodeGeo(e.lngLat.lng, e.lngLat.lat, 20); 
    const tune = bitsToTune(bits);
    document.getElementById("status").innerText = `Lat: ${e.lngLat.lat.toFixed(5)}, Lng: ${e.lngLat.lng.toFixed(5)}`;
    playTune(tune);
});

document.getElementById("search-btn").addEventListener("click", () => {
    const raw = document.getElementById("tune-search").value.trim();
    if (!raw) return;
    const tune = raw.split(/\s+/);
    const bits = tuneToBits(tune);
    const coords = decodeGeo(bits);
    map.flyTo({ center: [coords.lng, coords.lat], zoom: 17 });
    if (coords.lat === 0 && coords.lng === 0) {
        document.getElementById("status").innerText = `Decoded location: NULL ISLAND`;
    } else {
        document.getElementById("status").innerText = `Decoded: ${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)}`;
    }
    playTune(tune);
});

// COPY LOGIC
document.getElementById("copy-btn").addEventListener("click", function(e) {
    e.stopPropagation();
    const text = document.getElementById("tune-output").innerText;
    navigator.clipboard.writeText(text).then(() => {
        this.innerText = "Copied!";
        setTimeout(() => this.innerText = "Copy", 2000);
    });
});

// SHARE DRAWER LOGIC
document.getElementById("share-btn").addEventListener("click", () => {
    document.getElementById("share-drawer").classList.add("active");
});

document.getElementById("close-share").addEventListener("click", () => {
    document.getElementById("share-drawer").classList.remove("active");
});

// NEW: Copy the entire message including the link and tune
document.getElementById("copy-full-message").addEventListener("click", function() {
    const tune = document.getElementById("share-content").innerText;
    const url = "https://mapsmania.github.io/globalbuilding/what1tune.html";
    
    // Construct the plain text version for the clipboard
    const fullMessage = `I’m sharing a What1Tune address to help you find this specific location. Paste this tune into What1Tune (${url}) to view this location on a map:\n\n${tune}`;

    navigator.clipboard.writeText(fullMessage).then(() => {
        const originalText = this.innerText;
        this.innerText = "MESSAGE COPIED!";
        this.style.background = "#28a745"; // Change to green temporarily
        
        setTimeout(() => {
            this.innerText = originalText;
            this.style.background = "var(--accent-red)";
        }, 2000);
    });
});
document.getElementById("overlay-wrapper").addEventListener("mousedown", (e) => e.stopPropagation());
document.getElementById("share-drawer").addEventListener("mousedown", (e) => e.stopPropagation());
</script>
</body>
</html>
