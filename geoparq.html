<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>GeoParquet on MapLibre</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/parquet-wasm@0.6.0/dist/parquet_wasm.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script type="module">
    import * as parquet_wasm from 'https://unpkg.com/parquet-wasm@0.6.0/dist/esm/index.js';

    const map = new maplibregl.Map({
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: [13.388, 52.517],
        zoom: 9.5,
        container: 'map',
    });

    async function loadGeoParquet() {
        // Initialize WASM
        await parquet_wasm.default(); 

        try {
            // Added { mode: 'cors' } to solve the GitHub fetch issue
            const response = await fetch('https://mapsmania.github.io/globalbuilding/blocks.parquet', {
                mode: 'cors'
            });
            
            if (!response.ok) throw new Error('Network response was not ok');
            
            const buffer = await response.arrayBuffer();
            
            // Use readGeoParquet (specifically for spatial data)
            const geojsonUint8Array = parquet_wasm.readGeoParquet(new Uint8Array(buffer));
            const geojson = JSON.parse(new TextDecoder().decode(geojsonUint8Array));

            map.addSource('blocks-data', {
                type: 'geojson',
                data: geojson
            });

            map.addLayer({
                'id': 'blocks-layer',
                'type': 'fill', 
                'source': 'blocks-data',
                'paint': {
                    'fill-color': '#0080ff',
                    'fill-opacity': 0.5,
                    'fill-outline-color': '#fff'
                }
            });
            
            console.log("GeoParquet loaded successfully!");

        } catch (err) {
            console.error("Error loading GeoParquet:", err);
        }
    }

    map.on('load', loadGeoParquet);
</script>
</body>
</html>
