<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>GeoParquet on MapLibre</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/parquet-wasm@0.6.0/dist/parquet_wasm.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script type="module">
    // 1. Import the library as a module instead of a global script
    import * as parquet_wasm from 'https://unpkg.com/parquet-wasm@0.6.0/dist/esm/index.js';

    const map = new maplibregl.Map({
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [13.388, 52.517],
    zoom: 9.5,
    container: 'map',
  })

    async function loadGeoParquet() {
        // 2. Initialize WASM
        await parquet_wasm.default(); 

        const response = await fetch('https://mapsmania.github.io/globalbuilding/blocks.parquet');
        const buffer = await response.arrayBuffer();
        
        // 3. Read the Parquet data
        // Note: The method name might be 'readParquet' or 'readGeoParquet' 
        // depending on the specific version. 0.6.0 uses readParquet.
        const geojsonUint8Array = parquet_wasm.readParquet(new Uint8Array(buffer));
        const geojson = JSON.parse(new TextDecoder().decode(geojsonUint8Array));

        map.addSource('blocks-data', {
            type: 'geojson',
            data: geojson
        });

        map.addLayer({
            'id': 'blocks-layer',
            'type': 'fill', 
            'source': 'blocks-data',
            'paint': {
                'fill-color': '#0080ff',
                'fill-opacity': 0.5,
                'fill-outline-color': '#fff'
            }
        });

        // Fit bounds logic...
    }

    map.on('load', loadGeoParquet);
</script>
</body>
</html>
